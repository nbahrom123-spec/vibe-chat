<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Новое уведомление</title>
    <style>
        :root {
            --accent-color: #0088cc;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Эффект матового стекла для карточки */
        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px 24px;
            width: 85%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 24px;
        }

        /* Контейнер для фото с неоновым свечением */
        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.3);
        }

        /* Пульсирующий индикатор сообщения */
        .online-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #ff4757;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            border: 3px solid #1a1a2e;
            animation: ring 2s infinite;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
            margin-bottom: 32px;
        }

        /* Кнопка с эффектом глубины */
        .tg-button {
            display: block;
            background: linear-gradient(90deg, #0088cc, #00a8ff);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.4);
            transition: all 0.3s ease;
            animation: buttonPulse 2s infinite;
        }

        .tg-button:active {
            transform: scale(0.96);
            filter: brightness(1.1);
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes ring {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        @keyframes buttonPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="avatar-wrapper">
            <img src="photo.jpg" alt="Profile" class="profile-pic">
            <div class="online-badge">1</div>
        </div>
        
        <h1>Вам пришло фото</h1>
        <p>Настя отправила вам личное сообщение. Откройте Telegram, чтобы посмотреть.</p>

        <a href="tg://resolve?domain=tvoyanastiutytbot" class="tg-button">Смотреть в Telegram 👀</a>
    </div>

</body>
</html>
