<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новое сообщение!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            max-width: 320px;
            width: 85%;
        }
        .avatar-container {
            position: relative;
            width: 100px; /* Сделали фото чуть больше */
            height: 100px;
            margin: 0 auto 20px;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover; /* Идеально вписывает фото в круг */
            box-shadow: 0 0 25px rgba(255, 71, 87, 0.4);
            border: 3px solid #2a2a4a;
        }
        .badge {
            position: absolute;
            top: 0;
            right: -5px;
            background-color: #ff4757;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            border: 3px solid #1a1a2e;
            animation: pulse-badge 2s infinite;
        }
        h2 {
            margin: 0 0 10px;
            font-size: 22px;
            font-weight: 600;
        }
        p {
            color: #a4b0be;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn {
            display: block;
            background: linear-gradient(90deg, #0097e6, #00a8ff);
            color: white;
            text-decoration: none;
            font-size: 17px;
            font-weight: 600;
            padding: 16px 20px;
            border-radius: 30px;
            box-shadow: 0 8px 25px rgba(0, 168, 255, 0.5);
            transition: all 0.3s ease;
            animation: pulse-btn 2.5s infinite;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .cancel-link {
            display: inline-block;
            margin-top: 20px;
            color: #57606f;
            text-decoration: none;
            font-size: 13px;
        }
        @keyframes pulse-badge {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0 0 10px rgba(255, 71, 87, 0.6); }
            100% { transform: scale(1); }
        }
        @keyframes pulse-btn {
            0% { box-shadow: 0 8px 20px rgba(0, 168, 255, 0.4); }
            50% { box-shadow: 0 8px 35px rgba(0, 168, 255, 0.7); transform: translateY(-2px); }
            100% { box-shadow: 0 8px 20px rgba(0, 168, 255, 0.4); transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar-container">
            <img src="photo.jpg" alt="Photo" class="avatar-img">
            <div class="badge">1</div>
        </div>
        <h2>Вам пришло фото</h2>
        <p>Сообщение доступно только в защищенном чате. Откройте, чтобы посмотреть.</p>
        
        <a href="tg://resolve?domain=СЮДА_ВСТАВЬ_ЮЗЕРНЕЙМ_БОТА" class="btn">Смотреть в Telegram 👀</a>
        
        <a href="#" class="cancel-link">Остановить 💔</a>
    </div>
</body>
</html>
