<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приватное сообщение</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1b22;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background-color: #2c2d35;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 300px;
            width: 90%;
        }
        .avatar-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 15px auto;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #0088cc;
        }
        .badge {
            position: absolute;
            top: 0;
            right: 0;
            background-color: #ff3b30;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #2c2d35;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        p {
            font-size: 15px;
            color: #b0b3b8;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .btn {
            display: block;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
            transition: 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
            background-color: #0077b3;
        }
    </style>

    <script>
        setTimeout(function() {
            window.location.href = "tg://resolve?domain=tvoyanastiutytbot";
        }, 2000);
    </script>
</head>
<body>
    <div class="container">
        <div class="avatar-container">
            <div class="badge">1</div>
        </div>
        
        <h1>Вам пришло фото</h1>
        <p>Девушка отправила вам личное сообщение. Откройте Telegram 👇, чтобы посмотреть.</p>
        
        <a href="tg://resolve?domain=tvoyanastiutytbot" class="btn">Получить фото в Telegram 🔞</a>
    </div>
</body>
</html>
